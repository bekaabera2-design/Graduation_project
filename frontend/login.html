<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - GC Defense Hub</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .login-box {
            max-width: 450px;
        }

        .login-box .auth-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .login-box .auth-header .logo-big {
            font-size: 3.5rem;
            margin-bottom: 10px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .login-box .auth-header h1 {
            font-size: 2rem;
            font-weight: 800;
        }

        .login-box .auth-header h1 span {
            background: linear-gradient(135deg, #4A7CF7 0%, #7C5CFC 100%);
            -webkit-background-clip: text;
             background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-box .auth-header p {
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-options label {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .form-options label input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .form-options a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: var(--transition);
        }

        .form-options a:hover {
            color: var(--primary-light);
            text-decoration: underline;
        }

        .auth-links {
            text-align: center;
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid var(--navy-border);
            color: var(--text-secondary);
        }

        .auth-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .auth-links a:hover {
            color: var(--primary-light);
            text-decoration: underline;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .input-with-icon .form-input {
            padding-left: 42px;
        }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .toggle-password:hover {
            color: var(--text-primary);
        }

        .alert {
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert-danger {
            background: rgba(255, 71, 87, 0.1);
            color: #FF4757;
            border-left: 4px solid #FF4757;
        }

        .alert-success {
            background: rgba(0, 232, 143, 0.1);
            color: #00E88F;
            border-left: 4px solid #00E88F;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-box {
                padding: 20px;
            }
            .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>
    
    <div class="auth-container">
        <div class="auth-box login-box">
            <div class="auth-header">
                <div class="logo-big">🛡️</div>
                <h1>Welcome <span>Back</span></h1>
                <p>Login to your account</p>
            </div>

            <!-- Alert Container for Messages -->
            <div id="alertContainer"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-with-icon">
                        <span class="input-icon">📧</span>
                        <input 
                            type="email" 
                            class="form-input" 
                            id="email" 
                            placeholder="you@example.com" 
                            required 
                            autocomplete="email"
                        />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-with-icon">
                        <span class="input-icon">🔒</span>
                        <input 
                            type="password" 
                            class="form-input" 
                            id="password" 
                            placeholder="Enter your password" 
                            required 
                            autocomplete="current-password"
                        />
                        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                    </div>
                </div>

                <div class="form-options">
                    <label>
                        <input type="checkbox" id="rememberMe" /> Remember me
                    </label>
                    <a href="#">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="loginBtn">Login 🚀</button>
            </form>

            <div class="auth-links">
                Don't have an account? <a href="register.html">Register</a>
            </div>
        </div>
    </div>

    <script>
        
        const API_BASE_URL = 'http://localhost:5000/api';

          function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleBtn = document.querySelector('.toggle-password');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleBtn.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleBtn.textContent = '👁️';
            }
        }

        function showAlert(message, type) {
            const container = document.getElementById('alertContainer');
            
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.innerHTML = `
                <span>${type === 'danger' ? '❌' : '✅'}</span>
                <span>${message}</span>
            `;
            
            container.innerHTML = '';
            container.appendChild(alertDiv);
            
            setTimeout(() => {
                if (alertDiv.parentNode) {
                    alertDiv.style.opacity = '0';
                    alertDiv.style.transform = 'translateY(-10px)';
                    setTimeout(() => {
                        if (alertDiv.parentNode) {
                            alertDiv.remove();
                        }
                    }, 300);
                }
            }, 5000);
        }

        async function loginUser(email, password) {
            try {
                console.log('📤 Sending login request to:', `${API_BASE_URL}/auth/login`);
                console.log('📧 Email:', email);
                
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                console.log('📥 Response:', data);
                
                if (response.ok) {

                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    return { success: true, data };
                } else {
                    return { success: false, message: data.message || 'Login failed' };
                }
            } catch (error) {
                console.error('❌ Connection error:', error);
                return { 
                    success: false, 
                    message: 'Cannot connect to server. Make sure backend is running on port 5000' 
                };
            }
        }
        
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const loginBtn = document.getElementById('loginBtn');
            
            if (!email || !password) {
                showAlert('Please fill in all fields', 'danger');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Logging in...';
            
            const result = await loginUser(email, password);

            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Login 🚀';
            
            if (result.success) {
                showAlert('✅ Login successful! Redirecting...', 'success');
                
                if (rememberMe) {
                    localStorage.setItem('rememberEmail', email);
                } else {
                    localStorage.removeItem('rememberEmail');
                }
                
                    setTimeout(() => {
                    const user = JSON.parse(localStorage.getItem('user'));
                    if (user && user.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1500);
            } else {
                showAlert(`❌ ${result.message}`, 'danger');
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            const savedEmail = localStorage.getItem('rememberEmail');
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        // ============================================
        // ENTER KEY SUPPORT
        // ============================================
        
        document.getElementById('password').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });  
        async function testConnection() {
            try {
                const response = await fetch(`${API_BASE_URL}/test`);
                const data = await response.json();
                console.log('✅ Backend connected:', data);
                console.log('💡 Try logging in with: john@student.com / admin123');
                console.log('💡 Or: admin@defensehub.com / admin123');
            } catch (error) {
                console.error('❌ Cannot connect to backend:', error);
                console.log('💡 Make sure backend is running: cd backend && node server.js');
            }
        }
        testConnection();

        console.log('✅ Login page loaded!');
        console.log(`📡 API URL: ${API_BASE_URL}`);
    </script>
</body>
</html>
